---
version: "2"

issues:
  max-same-issues: 50

formatters:
  enable:
    - gofumpt
    - goimports
    - golines

  settings:
    goimports:
      local-prefixes:
        - github.com/danrneal/gtd.nvim

    golines:
      max-len: 120

linters:
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - containedctx
    - contextcheck
    - copyloopvar
    - cyclop
    - dogsled
    - durationcheck
    - dupl
    - dupword
    - embeddedstructfieldcheck
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - exptostd
    - fatcontext
    - forbidigo
    - funcorder
    - funlen
    - gocheckcompilerdirectives
    - gochecknoglobals
    - gochecknoinits
    - gocognit
    - goconst
    - gocritic
    - godoclint
    - godot
    - gomoddirectives
    - goprintffuncname
    - gosec
    - gosmopolitan
    - govet
    - iface
    - inamedparam
    - ineffassign
    - interfacebloat
    - intrange
    - iotamixing
    - ireturn
    - lll
    - loggercheck
    - makezero
    - mirror
    - misspell
    - modernize
    - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnesserr
    - nilnil
    - noctx
    - nolintlint
    - nonamedreturns
    - nosprintfhostport
    - perfsprint
    - prealloc
    - predeclared
    - promlinter
    - protogetter
    - reassign
    - recvcheck
    - revive
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - staticcheck
    - tagalign
    - tagliatelle
    - testableexamples
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unqueryvet
    - unused
    - usestdlibvars
    - usetesting
    - wastedassign
    - whitespace
    - wrapcheck
    - zerologlint
    - wsl_v5

  settings:
    cyclop:
      max-complexity: 30
      package-average: 10.0

    dupword:
      keywords:
        - "the"
        - "and"
        - "a"

    embeddedstructfieldcheck:
      forbid-mutex: true

    errcheck:
      check-type-assertions: true
      exclude-functions:
        - (*database/sql.Tx).Rollback

    exhaustive:
      check:
        - switch
        - map
      default-signifies-exhaustive: true

    funlen:
      lines: 100
      statements: 50

    funcorder:
      struct-method: false

    gocognit:
      min-complexity: 20

    gocritic:
      settings:
        captLocal:
          paramsOnly: false
        underef:
          skipRecvDeref: false

    godoclint:
      enable:
        - no-unused-link
        - require-stdlib-doclink

    govet:
      enable-all: true
      disable:
        - fieldalignment

    ireturn:
      allow:
        - anon
        - empty
        - error
        - stdlib
        - generic
        - (or|er)$

    lll:
      tab-width: 4

    misspell:
      locale: US

    nakedret:
      max-func-lines: 0

    nolintlint:
      allow-no-explanation: [funlen, gocognit, golines]
      require-explanation: true
      require-specific: true

    perfsprint:
      strconcat: false

    reassign:
      patterns:
        - ".*"

    revive:
      rules:
        - name: argument-limit
          arguments: [5]
        - name: call-to-gc
        - name: comment-spacings
        - name: confusing-naming
        - name: deep-exit
        - name: defer
        - name: early-return
          arguments: ["allow-jump"]
        - name: enforce-repeated-arg-type-style
          arguments: ["short"]
        - name: filename-format
        - name: flag-parameter
        - name: function-result-limit
        - name: get-return
        - name: if-return
        - name: import-shadowing
        - name: max-control-nesting
        - name: modifies-value-receiver
        - name: redundant-import-alias
        - name: redundant-test-main-exit
        - name: superfluous-else
        - name: time-naming
        - name: unconditional-recursion
        - name: useless-break

    rowserrcheck:
      packages:
        - github.com/jmoiron/sqlx

    sloglint:
      no-global: all
      context: scope

    staticcheck:
      checks:
        - all
        - -ST1000

    tagalign:
      order:
        - json
        - yaml
        - toml
        - mapstructure
        - binding
        - validate
      strict: true

    thelper:
      test:
        begin: false
      benchmark:
        begin: false
      tb:
        begin: false
      fuzz:
        begin: false

    usetesting:
      os-temp-dir: true

    wsl_v5:
      allow-whole-block: true
      default: none
      enable:
        - after-block
        - append
        - decl
        - defer
        - err
        - label
        - leading-whitespace
        - return
        - send
        - trailing-whitespace
        # Reconsider after https://github.com/bombsimon/wsl/pull/245 is merged
        # - if
        # - for
        # - range
        # - select
        # - switch
        # Reconsider after https://github.com/bombsimon/wsl/issues/244 is resolved
        # - expr
        # - go

  exclusions:
    warn-unused: true
    presets:
      - std-error-handling
      - common-false-positives
    rules:
      - path: '_test\.go'
        text: "early-return"
        linters:
          - revive
      - path: '_test\.go'
        linters:
          - bodyclose
          - dupl
          - errcheck
          - errchkjson
          - funlen
          - gocognit
          - goconst
          - gosec
          - noctx
          - wrapcheck
