---
version: "2"

issues:
  max-same-issues: 50

formatters:
  enable:
    - gofumpt
    - goimports
    - golines

  settings:
    goimports:
      local-prefixes: github.com/danrneal/gtd.nvim

    golines:
      max-len: 120

linters:
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - containedctx
    - contextcheck
    - copyloopvar
    - dogsled
    - durationcheck
    - dupl
    - dupword
    - embeddedstructfieldcheck
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - exptostd
    - fatcontext
    - forbidigo
    - funcorder
    - gocheckcompilerdirectives
    - ginkgolinter
    - gochecknoglobals
    - gochecknoinits
    - goconst
    - gocritic
    - godoclint
    - godot
    - gomoddirectives
    - goprintffuncname
    - gosec
    - gosmopolitan
    - govet
    - iface
    - inamedparam
    - ineffassign
    - interfacebloat
    - intrange
    - iotamixing
    - ireturn
    - loggercheck
    - makezero
    - mirror
    - misspell
    - modernize
    - musttag
    - nakedret
    - nilerr
    - nilnesserr
    - nilnil
    - noctx
    - nolintlint
    - nonamedreturns
    - nosprintfhostport
    - perfsprint
    - prealloc
    - predeclared
    - promlinter
    - protogetter
    - reassign
    - recvcheck
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - staticcheck
    - tagalign
    - tagliatelle
    - testableexamples
    - testifylint
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unqueryvet
    - unused
    - usestdlibvars
    - usetesting
    - wastedassign
    - whitespace
    - wrapcheck
    - zerologlint

  settings:
    dupword:
      keywords:
        - "the"
        - "and"
        - "a"

    embeddedstructfieldcheck:
      forbid-mutex: true

    errcheck:
      check-type-assertions: true
      exclude-functions:
        - (*database/sql.Tx).Rollback

    exhaustive:
      check:
        - switch
        - map
      default-signifies-exhaustive: true

    funcorder:
      struct-method: false

    ginkgolinter:
      forbid-focus-container: true
      force-expect-to: true
      validate-async-intervals: true
      forbid-spec-pollution: true
      force-succeed: true
      force-tonot: true

    gocritic:
      settings:
        captLocal:
          paramsOnly: false
        underef:
          skipRecvDeref: false

    godoclint:
      enable:
        - no-unused-link
        - require-stdlib-doclink

    govet:
      enable-all: true
      disable:
        - fieldalignment

    ireturn:
      allow:
        - anon
        - empty
        - error
        - stdlib
        - generic
        - (or|er)$

    misspell:
      locale: US

    nakedret:
      max-func-lines: 0

    nolintlint:
      allow-no-explanation: [funlen, gocognit, golines]
      require-explanation: true
      require-specific: true

    perfsprint:
      strconcat: false

    reassign:
      patterns:
        - ".*"

    rowserrcheck:
      packages:
        - github.com/jmoiron/sqlx

    sloglint:
      no-global: all
      context: scope

    staticcheck:
      checks:
        - all
        - -ST1000

    tagalign:
      order:
        - json
        - yaml
        - toml
        - mapstructure
        - binding
        - validate
      strict: true

    thelper:
      test:
        begin: false
      benchmark:
        begin: false
      tb:
        begin: false
      fuzz:
        begin: false

    usetesting:
      os-temp-dir: true

  exclusions:
    warn-unused: true
    presets:
      - std-error-handling
      - common-false-positives
    rules:
      - path: '_test\.go'
        linters:
          - bodyclose
          - dupl
          - errcheck
          - errchkjson
          - goconst
          - gosec
          - noctx
          - wrapcheck
